<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laternen GPS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #16213e;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 6px;
            margin-top: 16px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #0f3460;
            background: #0f3460;
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: #e94560; }
        .gps-box {
            background: #0f3460;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            color: #aaa;
            min-height: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }
        .gps-box.found { color: #4ecca3; }
        .gps-box.error { color: #e94560; }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #aaa;
            flex-shrink: 0;
        }
        .dot.found { background: #4ecca3; animation: pulse 1.5s infinite; }
        .dot.error { background: #e94560; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-gps {
            background: #0f3460;
            color: #4ecca3;
            border: 2px solid #4ecca3;
        }
        .btn-save {
            background: #e94560;
            color: #fff;
            margin-top: 20px;
        }
        .btn-save:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .status.success {
            background: rgba(78, 204, 163, 0.2);
            color: #4ecca3;
            border: 1px solid #4ecca3;
            display: block;
        }
        .status.error {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border: 1px solid #e94560;
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏮 Laternen GPS</h1>
        <p class="subtitle">Standort vor Ort erfassen</p>

        <label>Laternennummer</label>
        <input type="text" id="nummer" placeholder="z.B. RotPunkt_01" autocomplete="off">

        <label>GPS-Koordinaten</label>
        <div class="gps-box" id="gpsBox">
            <div class="dot" id="gpsDot"></div>
            <span id="gpsText">Noch nicht erfasst</span>
        </div>

        <button class="btn btn-gps" onclick="gpsErfassen()">📍 GPS erfassen</button>
        <button class="btn btn-save" id="btnSpeichern" onclick="speichern()" disabled>💾 Speichern</button>

        <div class="status" id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCosCBuhj0Wm8FIz6SsqB1LtUx3ObZA_iI",
            authDomain: "laternen-kurpark.firebaseapp.com",
            projectId: "laternen-kurpark",
            storageBucket: "laternen-kurpark.firebasestorage.app",
            messagingSenderId: "688065020321",
            appId: "1:688065020321:web:51d72b4f905fe35e948be0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let lat = null;
        let lon = null;

        window.gpsErfassen = function() {
            const gpsBox = document.getElementById('gpsBox');
            const gpsDot = document.getElementById('gpsDot');
            const gpsText = document.getElementById('gpsText');

            gpsText.textContent = 'GPS wird ermittelt...';
            gpsDot.className = 'dot';

            if (!navigator.geolocation) {
                gpsText.textContent = 'GPS nicht verfügbar auf diesem Gerät';
                gpsDot.className = 'dot error';
                gpsBox.className = 'gps-box error';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    lat = pos.coords.latitude.toFixed(6);
                    lon = pos.coords.longitude.toFixed(6);
                    gpsText.textContent = lat + ', ' + lon;
                    gpsDot.className = 'dot found';
                    gpsBox.className = 'gps-box found';
                    document.getElementById('btnSpeichern').disabled = false;
                },
                (err) => {
                    gpsText.textContent = 'GPS Fehler: ' + err.message;
                    gpsDot.className = 'dot error';
                    gpsBox.className = 'gps-box error';
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        };

        window.speichern = async function() {
            const nummer = document.getElementById('nummer').value.trim();
            const status = document.getElementById('status');

            if (!nummer) {
                status.textContent = '⚠️ Bitte Laternennummer eingeben!';
                status.className = 'status error';
                return;
            }

            if (!lat || !lon) {
                status.textContent = '⚠️ Bitte zuerst GPS erfassen!';
                status.className = 'status error';
                return;
            }

            try {
                await setDoc(doc(db, 'laternen', nummer), {
                    laternennummer: nummer,
                    latitude: lat,
                    longitude: lon,
                    timestamp: new Date().toISOString()
                });

                status.textContent = '✅ ' + nummer + ' gespeichert!';
                status.className = 'status success';

                // Felder zurücksetzen
                document.getElementById('nummer').value = '';
                lat = null;
                lon = null;
                document.getElementById('gpsText').textContent = 'Noch nicht erfasst';
                document.getElementById('gpsDot').className = 'dot';
                document.getElementById('gpsBox').className = 'gps-box';
                document.getElementById('btnSpeichern').disabled = true;

            } catch (err) {
                status.textContent = '❌ Fehler: ' + err.message;
                status.className = 'status error';
            }
        };
    </script>
</body>
</html>
